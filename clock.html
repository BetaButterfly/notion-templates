<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Годинник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .clock-container {
            text-align: center;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 32px;
            padding: 48px 56px;
            box-shadow: 
                0 4px 24px rgba(0,0,0,0.04),
                0 1px 3px rgba(0,0,0,0.02),
                inset 0 0 0 1px rgba(255,255,255,0.6);
            position: relative;
        }

        .time-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
        }

        .time-unit {
            font-size: 5rem;
            font-weight: 200;
            color: #57534e;
            letter-spacing: -2px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-separator {
            font-size: 3rem;
            font-weight: 200;
            color: #d6d3d1;
            animation: pulse 2s infinite;
            line-height: 1;
            padding-bottom: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .seconds-display {
            font-size: 1.8rem;
            font-weight: 300;
            color: #a8a29e;
            font-variant-numeric: tabular-nums;
            min-width: 48px;
        }

        .period {
            font-size: 1.2rem;
            font-weight: 400;
            color: #a8a29e;
            margin-left: 8px;
            text-transform: lowercase;
        }

        .date-display {
            font-size: 1rem;
            color: #a8a29e;
            letter-spacing: 0.02em;
            margin-top: 8px;
        }

        .day-display {
            font-size: 0.85rem;
            color: #d6d3d1;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
        }

        /* Toggle format button */
        .format-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.75rem;
            color: #a8a29e;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .format-toggle:hover {
            background: white;
            color: #57534e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .format-toggle:active {
            transform: scale(0.95);
        }

        /* Progress ring around seconds */
        .seconds-ring {
            position: absolute;
            top: 50%;
            right: 32px;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
        }

        .ring-svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(0,0,0,0.04);
            stroke-width: 3;
        }

        .ring-progress {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }

        @media (max-width: 640px) {
            .clock-card {
                padding: 36px 40px;
                border-radius: 24px;
            }
            .time-unit {
                font-size: 3.5rem;
            }
            .time-separator {
                font-size: 2.2rem;
            }
            .seconds-display {
                font-size: 1.4rem;
            }
            .period {
                font-size: 1rem;
            }
            .seconds-ring {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="clock-card">
            <button class="format-toggle" id="formatBtn" onclick="toggleFormat()">24H</button>
            
            <div class="day-display" id="dayName">П'ятниця</div>
            
            <div class="time-display">
                <span class="time-unit" id="hours">14</span>
                <span class="time-separator">:</span>
                <span class="time-unit" id="minutes">32</span>
                <span class="period" id="period"></span>
            </div>
            
            <div class="date-display" id="dateDisplay">17 квітня 2026</div>
            
            <svg class="seconds-ring" viewBox="0 0 48 48">
                <circle class="ring-bg" cx="24" cy="24" r="20"/>
                <circle class="ring-progress" id="ringProgress" cx="24" cy="24" r="20" 
                    stroke-dasharray="125.6" stroke-dashoffset="0"/>
            </svg>
        </div>
    </div>

    <script>
        var is24Hour = true;
        var days = ['Неділя','Понеділок','Вівторок','Середа','Четвер','П\'ятниця','Субота'];
        var months = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var s = now.getSeconds();

            // Update ring
            var circumference = 2 * Math.PI * 20; // r=20
            var offset = circumference - (s / 60) * circumference;
            var ring = document.getElementById('ringProgress');
            if (ring) ring.style.strokeDashoffset = offset;

            // Format hours
            var displayH = h;
            var period = '';
            
            if (!is24Hour) {
                period = h >= 12 ? 'pm' : 'am';
                displayH = h % 12 || 12;
            }

            document.getElementById('hours').textContent = pad(displayH);
            document.getElementById('minutes').textContent = pad(m);
            document.getElementById('period').textContent = period;

            // Date
            document.getElementById('dayName').textContent = days[now.getDay()];
            document.getElementById('dateDisplay').textContent = 
                now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
        }

        function pad(n) {
            return n < 10 ? '0' + n : '' + n;
        }

        function toggleFormat() {
            is24Hour = !is24Hour;
            document.getElementById('formatBtn').textContent = is24Hour ? '24H' : '12H';
            updateClock();
        }

        // Update immediately and every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
