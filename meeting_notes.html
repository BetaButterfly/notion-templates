<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Нотатки зустрічі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(0,0,0,0.05);
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafaf9;
            color: #1c1917;
            padding: 16px;
            font-size: 16px;
            line-height: 1.6;
        }

        .wrap {
            max-width: 700px;
            margin: 0 auto;
        }

        h1, h2 {
            margin-bottom: 4px;
            color: #292524;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            flex: 1;
            min-width: 200px;
        }

        .block {
            background: #ffffff;
            border: 2px solid #d1ccc7;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .block-header {
            border-color: #a8d5ba;
        }

        .block-participants {
            border-color: #a8d5ba;
        }

        .block-agenda {
            border-color: #a8d5ba;
        }

        .block-notes {
            border-color: #a8d5ba;
        }

        .block-decisions {
            border-color: #d4b5e0;
        }

        .block-tasks {
            border-color: #d4b5e0;
        }

        .block-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #292524;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid;
        }

        .block-title-collapsible {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .expand-icon {
            display: inline-block;
            transition: transform 300ms ease;
            font-size: 12px;
        }

        .block-title-collapsible.collapsed .expand-icon {
            transform: rotate(-90deg);
        }

        .block-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 300ms ease;
        }

        .block-content.collapsed {
            max-height: 0;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #78716c;
            margin-bottom: 4px;
        }

        .input,
        .textarea {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #d1ccc7;
            border-radius: 4px;
            font-family: inherit;
            font-size: 16px;
        }

        .input:focus,
        .textarea:focus {
            outline: none;
            border-color: #a8d5ba;
            box-shadow: 0 0 0 2px rgba(168, 213, 186, 0.1);
        }

        .textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .form-group-half {
            display: inline-block;
            width: calc(50% - 8px);
        }

        .form-group-half:first-child {
            margin-right: 16px;
        }

        .btn-add,
        .btn-remove,
        .btn-export {
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid #d1ccc7;
            border-radius: 4px;
            background: #a8d5ba;
            color: #1c1917;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: background 200ms ease;
            min-height: 44px;
            min-width: 44px;
        }

        .btn-add:hover,
        .btn-export:hover {
            background: #98c5aa;
        }

        .btn-remove {
            background: #f5f5f4;
            color: #57534e;
            padding: 4px 8px;
            min-width: auto;
            min-height: auto;
        }

        .btn-remove:hover {
            background: #e7e5e4;
        }

        .btn-export {
            padding: 10px 16px;
            background: #a8d5ba;
        }

        .block-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
        }

        .block-row:last-child {
            margin-bottom: 0;
        }

        .dynamic-list {
            margin-bottom: 12px;
        }

        .list-item,
        .task-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .list-item input,
        .task-row input {
            flex: 1;
        }

        .task-row {
            flex-wrap: wrap;
        }

        .task-row input[type="text"] {
            flex: 1;
            min-width: 150px;
        }

        .task-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex: 0 0 20px;
            accent-color: #a8d5ba;
        }

        .task-row .assignee-input {
            flex: 0 1 150px;
        }

        .task-row.completed input[type="text"] {
            opacity: 0.6;
            text-decoration: line-through;
        }

        @media (max-width: 599px) {
            body {
                padding: 12px;
                font-size: 16px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .header h1 {
                margin-bottom: 0;
            }

            .btn-export {
                width: 100%;
            }

            .block {
                padding: 12px;
                margin-bottom: 12px;
            }

            .block-title {
                font-size: 13px;
            }

            .input,
            .textarea {
                padding: 10px 12px;
                font-size: 16px;
            }

            .btn-add {
                width: 100%;
            }

            .form-group-half {
                display: block;
                width: 100%;
                margin-right: 0;
            }

            .list-item,
            .task-row {
                flex-direction: column;
                align-items: stretch;
            }

            .list-item input,
            .task-row input {
                width: 100%;
            }

            .task-row .assignee-input {
                flex: 1;
            }
        }

        @media (min-width: 600px) and (max-width: 899px) {
            .wrap {
                max-width: 600px;
            }

            body {
                padding: 16px;
            }
        }

        @media (min-width: 900px) {
            body {
                padding: 20px;
            }
        }

        @media print {
            body {
                background: white;
                padding: 10px;
            }

            .btn-add,
            .btn-remove,
            .btn-export,
            .block-title-collapsible {
                display: none;
            }

            .expand-icon {
                display: none;
            }

            .block-content {
                max-height: none;
            }

            .input,
            .textarea {
                border: none;
                background: white;
                color: #000;
                padding: 0;
                margin: 4px 0;
            }

            .block {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="header">
            <h1>Нотатки зустрічі</h1>
            <button id="exportPdf" class="btn-export">Завантажити PDF</button>
        </header>
        <main>
            <section class="block block-header">
                <div class="block-row">
                    <div class="form-group">
                        <label for="meetingTitle">Назва зустрічі</label>
                        <input type="text" id="meetingTitle" class="input" placeholder="Введіть назву">
                    </div>
                </div>
                <div class="block-row">
                    <div class="form-group form-group-half">
                        <label for="meetingDate">Дата</label>
                        <input type="date" id="meetingDate" class="input">
                    </div>
                    <div class="form-group form-group-half">
                        <label for="meetingTime">Час</label>
                        <input type="time" id="meetingTime" class="input">
                    </div>
                </div>
            </section>

            <section class="block block-participants">
                <h2 class="block-title" style="border-color: #a8d5ba;">Учасники</h2>
                <div id="participantsList" class="dynamic-list"></div>
                <button class="btn-add" id="addParticipant">+ Додати учасника</button>
            </section>

            <section class="block block-agenda">
                <h2 class="block-title" style="border-color: #a8d5ba;">Порядок денний</h2>
                <div id="agendaList" class="dynamic-list"></div>
                <button class="btn-add" id="addAgenda">+ Додати пункт</button>
            </section>

            <section class="block block-notes">
                <h2 class="block-title block-title-collapsible" data-section="notes" style="border-color: #a8d5ba;">
                    Нотатки &amp; Дискусія
                    <span class="expand-icon">↓</span>
                </h2>
                <div class="block-content" id="notesContent">
                    <textarea id="notes" class="textarea" placeholder="Записуйте основне обговорення..."></textarea>
                </div>
            </section>

            <section class="block block-decisions">
                <h2 class="block-title block-title-collapsible" data-section="decisions" style="border-color: #d4b5e0;">
                    Рішення
                    <span class="expand-icon">↓</span>
                </h2>
                <div class="block-content" id="decisionsContent">
                    <div id="decisionsList" class="dynamic-list"></div>
                    <button class="btn-add" id="addDecision">+ Додати рішення</button>
                </div>
            </section>

            <section class="block block-tasks">
                <h2 class="block-title block-title-collapsible" data-section="tasks" style="border-color: #d4b5e0;">
                    Завдання
                    <span class="expand-icon">↓</span>
                </h2>
                <div class="block-content" id="tasksContent">
                    <div id="tasksList" class="tasks-table"></div>
                    <button class="btn-add" id="addTask">+ Додати завдання</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Data structure
        const defaultData = {
            meetingTitle: '',
            meetingDate: new Date().toISOString().split('T')[0],
            meetingTime: '09:00',
            participants: [],
            agenda: [],
            notes: '',
            decisions: [],
            tasks: []
        };

        let appData = defaultData;
        const STORAGE_KEY = 'meetingNotes_data';

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    appData = JSON.parse(stored);
                } catch (e) {
                    console.error('Failed to parse stored data:', e);
                    appData = defaultData;
                }
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        }

        function renderParticipants() {
            const list = document.getElementById('participantsList');
            list.innerHTML = '';

            appData.participants.forEach((participant, index) => {
                const row = document.createElement('div');
                row.className = 'list-item';
                row.innerHTML = `
                    <input type="text" class="input participant-input" value="${participant}" data-index="${index}" placeholder="Ім'я учасника">
                    <button class="btn-remove" data-index="${index}">−</button>
                `;
                list.appendChild(row);

                row.querySelector('.participant-input').addEventListener('input', (e) => {
                    appData.participants[index] = e.target.value;
                    saveData();
                });

                row.querySelector('.btn-remove').addEventListener('click', () => {
                    appData.participants.splice(index, 1);
                    saveData();
                    renderParticipants();
                });
            });
        }

        function renderAgenda() {
            const list = document.getElementById('agendaList');
            list.innerHTML = '';

            appData.agenda.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'list-item';
                row.innerHTML = `
                    <input type="text" class="input agenda-input" value="${item}" data-index="${index}" placeholder="Пункт порядку денного">
                    <button class="btn-remove" data-index="${index}">−</button>
                `;
                list.appendChild(row);

                row.querySelector('.agenda-input').addEventListener('input', (e) => {
                    appData.agenda[index] = e.target.value;
                    saveData();
                });

                row.querySelector('.btn-remove').addEventListener('click', () => {
                    appData.agenda.splice(index, 1);
                    saveData();
                    renderAgenda();
                });
            });
        }

        function renderDecisions() {
            const list = document.getElementById('decisionsList');
            list.innerHTML = '';

            appData.decisions.forEach((decision, index) => {
                const row = document.createElement('div');
                row.className = 'list-item';
                row.innerHTML = `
                    <input type="text" class="input decision-input" value="${decision}" data-index="${index}" placeholder="Рішення">
                    <button class="btn-remove" data-index="${index}">−</button>
                `;
                list.appendChild(row);

                row.querySelector('.decision-input').addEventListener('input', (e) => {
                    appData.decisions[index] = e.target.value;
                    saveData();
                });

                row.querySelector('.btn-remove').addEventListener('click', () => {
                    appData.decisions.splice(index, 1);
                    saveData();
                    renderDecisions();
                });
            });
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            list.innerHTML = '';

            appData.tasks.forEach((task, index) => {
                const row = document.createElement('div');
                row.className = `task-row ${task.completed ? 'completed' : ''}`;
                row.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} data-index="${index}">
                    <input type="text" class="input task-name-input" value="${task.name}" data-index="${index}" placeholder="Назва завдання">
                    <input type="text" class="input assignee-input" value="${task.assignee}" data-index="${index}" placeholder="Відповідальна особа">
                    <button class="btn-remove" data-index="${index}">−</button>
                `;
                list.appendChild(row);

                row.querySelector('.task-checkbox').addEventListener('change', (e) => {
                    appData.tasks[index].completed = e.target.checked;
                    saveData();
                    renderTasks();
                });

                row.querySelector('.task-name-input').addEventListener('input', (e) => {
                    appData.tasks[index].name = e.target.value;
                    saveData();
                });

                row.querySelector('.assignee-input').addEventListener('input', (e) => {
                    appData.tasks[index].assignee = e.target.value;
                    saveData();
                });

                row.querySelector('.btn-remove').addEventListener('click', () => {
                    appData.tasks.splice(index, 1);
                    saveData();
                    renderTasks();
                });
            });
        }

        function initializeCollapsible() {
            const collapsibleTitles = document.querySelectorAll('.block-title-collapsible');

            collapsibleTitles.forEach(title => {
                const section = title.dataset.section;
                const isCollapsed = localStorage.getItem(`section_${section}_collapsed`) === 'true';
                if (isCollapsed) {
                    title.classList.add('collapsed');
                    document.getElementById(`${section}Content`).classList.add('collapsed');
                }

                title.addEventListener('click', () => {
                    const content = document.getElementById(`${section}Content`);
                    const isNowCollapsed = title.classList.toggle('collapsed');
                    content.classList.toggle('collapsed');
                    localStorage.setItem(`section_${section}_collapsed`, isNowCollapsed);
                });
            });
        }

        function exportPDF() {
            const sections = document.querySelectorAll('.block-content');
            sections.forEach(section => section.classList.remove('collapsed'));

            const titles = document.querySelectorAll('.block-title-collapsible');
            titles.forEach(title => title.classList.remove('collapsed'));

            setTimeout(() => {
                window.print();
                loadCollapsedStates();
            }, 100);
        }

        function loadCollapsedStates() {
            const collapsibleTitles = document.querySelectorAll('.block-title-collapsible');
            collapsibleTitles.forEach(title => {
                const section = title.dataset.section;
                const isCollapsed = localStorage.getItem(`section_${section}_collapsed`) === 'true';
                if (isCollapsed) {
                    title.classList.add('collapsed');
                    document.getElementById(`${section}Content`).classList.add('collapsed');
                }
            });
        }

        function initializeData() {
            loadData();

            document.getElementById('meetingTitle').value = appData.meetingTitle || '';
            document.getElementById('meetingDate').value = appData.meetingDate || '';
            document.getElementById('meetingTime').value = appData.meetingTime || '';
            document.getElementById('notes').value = appData.notes || '';

            renderParticipants();
            renderAgenda();
            renderDecisions();
            renderTasks();
            initializeCollapsible();
        }

        // Auto-save listeners
        document.getElementById('meetingTitle').addEventListener('input', (e) => {
            appData.meetingTitle = e.target.value;
            saveData();
        });

        document.getElementById('meetingDate').addEventListener('change', (e) => {
            appData.meetingDate = e.target.value;
            saveData();
        });

        document.getElementById('meetingTime').addEventListener('change', (e) => {
            appData.meetingTime = e.target.value;
            saveData();
        });

        document.getElementById('notes').addEventListener('input', (e) => {
            appData.notes = e.target.value;
            saveData();
        });

        // Add button listeners
        document.getElementById('addParticipant').addEventListener('click', () => {
            appData.participants.push('');
            saveData();
            renderParticipants();
            setTimeout(() => {
                const inputs = document.querySelectorAll('.participant-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }, 0);
        });

        document.getElementById('addAgenda').addEventListener('click', () => {
            appData.agenda.push('');
            saveData();
            renderAgenda();
            setTimeout(() => {
                const inputs = document.querySelectorAll('.agenda-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }, 0);
        });

        document.getElementById('addDecision').addEventListener('click', () => {
            appData.decisions.push('');
            saveData();
            renderDecisions();
            setTimeout(() => {
                const inputs = document.querySelectorAll('.decision-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }, 0);
        });

        document.getElementById('addTask').addEventListener('click', () => {
            appData.tasks.push({ name: '', assignee: '', completed: false });
            saveData();
            renderTasks();
            setTimeout(() => {
                const inputs = document.querySelectorAll('.task-name-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }, 0);
        });

        document.getElementById('exportPdf').addEventListener('click', exportPDF);

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeData);
    </script>
</body>
</html>
